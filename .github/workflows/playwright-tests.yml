name: Playwright Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Minimal read-only permissions for the GITHUB_TOKEN by default
permissions:
  contents: read

# Cancel any in-progress run for the same ref when a new commit is pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: true

    steps:
      # 1. Checkout the repository at the PR head commit
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up the latest LTS Node.js and enable Yarn dependency caching
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: yarn

      # 3. Install dependencies with a fully reproducible, immutable lockfile
      - name: Install dependencies
        run: yarn install --immutable --immutable-cache --check-cache

      # 4. Download Playwright browser binaries and required OS dependencies
      - name: Install Playwright browsers
        run: yarn playwright install --with-deps

      # 5. Execute the full test suite in parallel (workers determined by Playwright config)
      - name: Run Playwright tests
        run: yarn playwright test

      # 6. Always upload the HTML report so failures can be inspected in the Actions UI
      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: playwright-report/

      # 7. Always upload trace archives to enable time-travel debugging on failures
      - name: Upload Playwright traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/**/trace*.zip

  deploy-report:
    # Only deploy to GitHub Pages from the main branch — never from PRs.
    # This satisfies the github-pages environment protection rules.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: playwright-tests
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download HTML report
        uses: actions/download-artifact@v4
        with:
          name: playwright-html-report
          path: playwright-report/

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: playwright-report/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4