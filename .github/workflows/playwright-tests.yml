name: Playwright Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

# Minimal read-only permissions for the GITHUB_TOKEN by default
permissions:
  contents: read

# Cancel any in-progress run for the same ref when a new commit is pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pages: write
      id-token: write
    env:
      CI: true

    steps:
      # 1. Checkout the repository at the PR head commit
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up the latest LTS Node.js and enable Yarn dependency caching
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: yarn

      # 3. Install dependencies with a fully reproducible, immutable lockfile
      - name: Install dependencies
        run: yarn install --immutable --immutable-cache --check-cache

      # 4. Download Playwright browser binaries and required OS dependencies
      - name: Install Playwright browsers
        run: yarn playwright install --with-deps

      # 5. Execute the full test suite in parallel (workers determined by Playwright config)
      - name: Run Playwright tests
        run: yarn playwright test

      # 6. Always upload the HTML report so failures can be inspected in the Actions UI
      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: playwright-report/

      # 7. Always upload trace archives to enable time-travel debugging on failures
      - name: Upload Playwright traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/**/trace*.zip

  deploy-report:
    # Only deploy to GitHub Pages from the main branch — never from PRs.
    # This satisfies the github-pages environment protection rules.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: playwright-tests
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download HTML report
        uses: actions/download-artifact@v4
        with:
          name: playwright-html-report
          path: playwright-report/

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: playwright-report/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # 8. Notify Microsoft Teams when the workflow fails
      - name: Notify Teams on failure
        if: failure()
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -H "Content-Type: application/json" \
            -d '{
              "text": "🚨 **Playwright Tests Failed**\n\n**PR:** ${{ github.event.pull_request.title }}\n**Author:** ${{ github.event.pull_request.user.login }}\n**Branch:** ${{ github.head_ref }}\n**Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }' \
            "${{ secrets.TEAMS_WEBHOOK_URL }}"

      # 9. Fetch existing run history from gh-pages (main only)
      - name: Fetch history from gh-pages
        if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git fetch origin gh-pages 2>/dev/null || true
          if git show origin/gh-pages:history.json > /tmp/history.json 2>/dev/null; then
            echo "History fetched"
          else
            echo "[]" > /tmp/history.json
          fi

      # 10. Append current run record to history.json and write into report dir (main only)
      - name: Update history.json
        if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          node - <<'EOF'
          const fs = require('fs');
          const history = JSON.parse(fs.readFileSync('/tmp/history.json', 'utf8'));
          history.push({
            timestamp:  new Date().toISOString(),
            runUrl:     `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`,
            commitSha:  process.env.GITHUB_SHA,
            ref:        process.env.GITHUB_REF,
            conclusion: process.env.GITHUB_JOB_STATUS ?? 'unknown',
          });
          fs.mkdirSync('playwright-report', { recursive: true });
          fs.writeFileSync('playwright-report/history.json', JSON.stringify(history, null, 2));
          EOF
        env:
          GITHUB_JOB_STATUS: ${{ job.status }}

      # 11. Upload playwright-report/ as the GitHub Pages artifact (main only)
      - name: Upload Pages artifact
        if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: playwright-report/

      # 12. Deploy to GitHub Pages (main only)
      - name: Deploy to GitHub Pages
        if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/deploy-pages@v4

  security-scan:
    runs-on: ubuntu-latest
    continue-on-error: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable --immutable-cache --check-cache

      - name: Run dependency vulnerability scan
        id: audit
        run: |
          yarn audit --level high --json > audit-report.json 2>&1 || true
          echo "## Dependency Vulnerability Scan" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          node - <<'EOF'
          const fs = require('fs');
          const lines = fs.readFileSync('audit-report.json', 'utf8').trim().split('\n');
          const summary = lines.map(l => { try { return JSON.parse(l); } catch { return null; } }).find(o => o?.type === 'auditSummary');
          const vulns = summary?.data?.vulnerabilities ?? {};
          const high = (vulns.high ?? 0) + (vulns.critical ?? 0);
          const rows = ['| Severity | Count |', '|----------|-------|'];
          for (const [k, v] of Object.entries(vulns)) rows.push(`| ${k} | ${v} |`);
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, rows.join('\n') + '\n\n');
          if (high > 0) {
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, `> ❌ **${high} high/critical vulnerabilit${high === 1 ? 'y' : 'ies'} found — PR blocked.**\n`);
            process.exit(1);
          }
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, '> ✅ No high or critical vulnerabilities found.\n');
          EOF