name: Playwright Tests

on:
  pull_request:
    branches: [ main ]

# Minimal read-only permissions for the GITHUB_TOKEN
permissions:
  contents: read

# Cancel any in-progress run for the same PR when a new commit is pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: true

    steps:
      # 1. Checkout the repository at the PR head commit
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up the latest LTS Node.js and enable Yarn dependency caching
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: yarn

      # 3. Install dependencies with a fully reproducible, immutable lockfile
      - name: Install dependencies
        run: yarn install --immutable --immutable-cache --check-cache

      # 4. Download Playwright browser binaries and required OS dependencies
      - name: Install Playwright browsers
        run: yarn playwright install --with-deps

      # 5. Execute the full test suite in parallel (workers determined by Playwright config)
      - name: Run Playwright tests
        run: yarn playwright test

      # 6. Always upload the HTML report so failures can be inspected in the Actions UI
      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: playwright-report/

      # 7. Always upload trace archives to enable time-travel debugging on failures
      - name: Upload Playwright traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/**/trace*.zip

      # 8. Notify Microsoft Teams when the workflow fails
      - name: Notify Teams on failure
        if: failure()
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -H "Content-Type: application/json" \
            -d '{
              "text": "🚨 **Playwright Tests Failed**\n\n**PR:** ${{ github.event.pull_request.title }}\n**Author:** ${{ github.event.pull_request.user.login }}\n**Branch:** ${{ github.head_ref }}\n**Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }' \
            "${{ secrets.TEAMS_WEBHOOK_URL }}"